<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Wall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1a1814;
      --paper: #fbf8f1;
      --accent: #c8553d;
      --muted: #8a8478;
      --line: #d9d3c4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fraunces', Georgia, serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 2.5rem 1.5rem 4rem;
      background-image:
        radial-gradient(circle at 20% 10%, rgba(200,85,61,0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(26,24,20,0.03) 0%, transparent 40%);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2rem;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 0.95;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .compose {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px -12px rgba(0,0,0,0.08);
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.125rem;
      line-height: 1.5;
      background: transparent;
      color: var(--ink);
      min-height: 80px;
    }

    textarea::placeholder {
      color: var(--muted);
      font-style: italic;
    }

    .compose-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--line);
    }

    .counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .counter.warn { color: var(--accent); }

    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.7rem 1.4rem;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .messages-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.5rem;
    }

    .messages-head h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .count-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .messages {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1.25rem 1.5rem;
      animation: slideIn 0.4s ease-out;
      position: relative;
    }

    .message::before {
      content: '';
      position: absolute;
      left: 0;
      top: 1.25rem;
      bottom: 1.25rem;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message:hover::before { opacity: 1; }

    .message-text {
      font-size: 1.0625rem;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.6rem;
      letter-spacing: 0.05em;
    }

    .empty, .loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-style: italic;
    }

    .error {
      background: #fdf0ed;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.75rem 1rem;
      border-radius: 2px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body { padding: 1.5rem 1rem 3rem; }
      .compose { padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">— a place for thoughts</div>
      <h1>Message <em>Wall</em></h1>
    </header>

    <div class="compose">
      <textarea id="messageInput" placeholder="Write something worth remembering…" maxlength="500"></textarea>
      <div class="compose-foot">
        <span class="counter" id="counter">0 / 500</span>
        <button id="sendBtn">Post</button>
      </div>
    </div>

    <div id="errorBox"></div>

    <div class="messages-head">
      <h2>Recent posts</h2>
      <span class="count-badge" id="countBadge"></span>
    </div>

    <ul class="messages" id="messageList">
      <li class="loading">Loading messages…</li>
    </ul>
  </div>

  <script>
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const counter = document.getElementById('counter');
    const list = document.getElementById('messageList');
    const countBadge = document.getElementById('countBadge');
    const errorBox = document.getElementById('errorBox');

    function showError(msg) {
      errorBox.innerHTML = `<div class="error">${msg}</div>`;
      setTimeout(() => errorBox.innerHTML = '', 4000);
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const now = Date.now();
      const diff = now - ts;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderMessages(messages) {
      countBadge.textContent = messages.length === 0 ? '' : `${messages.length} ${messages.length === 1 ? 'post' : 'posts'}`;
      if (messages.length === 0) {
        list.innerHTML = '<li class="empty">No messages yet. Be the first.</li>';
        return;
      }
      list.innerHTML = messages.map(m => `
        <li class="message">
          <div class="message-text">${escapeHtml(m.text)}</div>
          <div class="message-meta">#${m.id} · ${formatTime(m.created_at)}</div>
        </li>
      `).join('');
    }

    async function loadMessages() {
      try {
        const res = await fetch('/api/messages');
        if (!res.ok) throw new Error('Failed to load');
        const messages = await res.json();
        renderMessages(messages);
      } catch (e) {
        list.innerHTML = '<li class="empty">Could not load messages.</li>';
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      sendBtn.disabled = true;
      try {
        const res = await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Failed to send');
        }
        input.value = '';
        updateCounter();
        await loadMessages();
      } catch (e) {
        showError(e.message);
      } finally {
        sendBtn.disabled = false;
      }
    }

    function updateCounter() {
      const len = input.value.length;
      counter.textContent = `${len} / 500`;
      counter.classList.toggle('warn', len > 450);
    }

    input.addEventListener('input', updateCounter);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);

    // Initial load + auto-refresh every 10 seconds
    loadMessages();
    setInterval(loadMessages, 10000);
  </script>
</body>
</html>
